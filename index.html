<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stop &amp; Write — видеопрактика английского</title>
<style>
  :root{
    --bg:#0F1320; --bg2:#141A2B; --bg3:#0B0F1A;
    --text:#F2EFE9; --dim:#98A1B8; --dim2:#6E768C;
    --glass:rgba(255,255,255,.045); --brd:rgba(255,255,255,.10); --brd2:rgba(255,255,255,.16);
    --red:#EA4B4B; --red2:#FF6A5A; --gold:#F4B740; --blue:#5C8DF6; --violet:#8B6BF0; --green:#34C77B;
    --hot:linear-gradient(135deg,#EA4B4B 0%,#F4B740 100%);
    --cool:linear-gradient(135deg,#3D6FE0 0%,#8B6BF0 100%);
    --r:16px;
    --serif:Georgia,"Times New Roman",serif;
    --sans:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
    --mono:ui-monospace,"SF Mono",Menlo,Consolas,monospace;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    background:var(--bg); color:var(--text); font-family:var(--sans); line-height:1.55;
    min-height:100vh; -webkit-font-smoothing:antialiased; overflow-x:hidden; position:relative;
  }
  button{font:inherit;cursor:pointer;color:inherit;border:0;background:none}
  ::selection{background:rgba(244,183,64,.3)}

  /* animated background */
  .bgfx{position:fixed;inset:0;z-index:-2;background:
    radial-gradient(1100px 700px at 12% -5%, rgba(92,141,246,.16), transparent 60%),
    radial-gradient(1000px 700px at 95% 0%, rgba(234,75,75,.16), transparent 55%),
    linear-gradient(180deg,var(--bg) 0%, var(--bg3) 100%);}
  .blob{position:fixed;z-index:-1;border-radius:50%;filter:blur(70px);opacity:.5;pointer-events:none}
  .blob.a{width:460px;height:460px;background:radial-gradient(circle,#EA4B4B,transparent 70%);top:-120px;right:-80px;animation:float1 18s ease-in-out infinite}
  .blob.b{width:420px;height:420px;background:radial-gradient(circle,#5C8DF6,transparent 70%);bottom:-140px;left:-100px;animation:float2 22s ease-in-out infinite}
  .blob.c{width:300px;height:300px;background:radial-gradient(circle,#F4B740,transparent 70%);top:40%;left:60%;opacity:.25;animation:float1 26s ease-in-out infinite reverse}
  @keyframes float1{0%,100%{transform:translate(0,0)}50%{transform:translate(-40px,40px)}}
  @keyframes float2{0%,100%{transform:translate(0,0)}50%{transform:translate(50px,-30px)}}
  .stars{position:fixed;inset:0;z-index:-1;pointer-events:none}
  .stars i{position:absolute;width:2px;height:2px;background:#fff;border-radius:50%;opacity:.6;animation:tw 3s ease-in-out infinite}
  @keyframes tw{0%,100%{opacity:.15}50%{opacity:.85}}

  /* chrome / header */
  header{position:sticky;top:0;z-index:30;display:flex;align-items:center;justify-content:space-between;gap:16px;
    padding:14px 24px;border-bottom:1px solid var(--brd);background:rgba(15,19,32,.7);backdrop-filter:blur(14px)}
  header.hidden{display:none}
  .brand{display:flex;align-items:center;gap:11px;font-family:var(--serif);font-size:22px;letter-spacing:.2px}
  .brand .mark{width:36px;height:36px;border-radius:10px;background:var(--hot);display:grid;place-items:center;color:#1a1208;font-weight:800;font-size:15px;letter-spacing:.3px;font-family:var(--sans);box-shadow:0 6px 18px rgba(234,75,75,.4)}
  .brand b{font-weight:normal} .brand .amp{color:var(--gold)}
  .brand .ipa{font-family:var(--sans);font-size:12px;color:var(--dim);margin-left:2px}
  .hbtn{padding:9px 15px;border-radius:11px;font-size:13px;font-weight:600;border:1px solid var(--brd2);background:var(--glass);transition:.18s}
  .hbtn:hover{border-color:var(--gold);color:#fff;transform:translateY(-1px)}
  .badge{font-size:12px;font-weight:700;padding:7px 13px;border-radius:999px;background:rgba(234,75,75,.15);color:var(--red2);border:1px solid rgba(234,75,75,.4)}

  .wrap{max-width:1040px;margin:0 auto;padding:30px 22px 90px}
  .viewroot{animation:viewIn .5s cubic-bezier(.2,.7,.2,1)}
  @keyframes viewIn{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}

  /* buttons */
  .btn{position:relative;display:inline-flex;align-items:center;gap:8px;padding:12px 20px;border-radius:12px;font-size:14px;font-weight:700;
    background:var(--hot);color:#1c1206;box-shadow:0 8px 24px rgba(234,75,75,.32);transition:transform .12s, box-shadow .2s, filter .2s;overflow:hidden}
  .btn:hover{transform:translateY(-2px);box-shadow:0 12px 30px rgba(234,75,75,.45);filter:brightness(1.05)}
  .btn:active{transform:translateY(0)}
  .btn.cool{background:var(--cool);color:#fff;box-shadow:0 8px 24px rgba(92,141,246,.34)}
  .btn.ghost{background:var(--glass);color:var(--text);border:1px solid var(--brd2);box-shadow:none}
  .btn.ghost:hover{border-color:var(--gold)}
  .btn.go{background:linear-gradient(135deg,#34C77B,#22A86A);color:#062417;box-shadow:0 8px 24px rgba(52,199,123,.3)}
  .btn.sm{padding:9px 14px;font-size:13px;border-radius:10px}
  .btn .sheen{position:absolute;top:0;left:-120%;width:60%;height:100%;background:linear-gradient(100deg,transparent,rgba(255,255,255,.5),transparent);transform:skewX(-18deg);transition:left .6s}
  .btn:hover .sheen{left:140%}

  /* login / hero */
  .auth{min-height:100vh;display:grid;grid-template-columns:1.05fr .95fr;align-items:center;gap:30px;max-width:1100px;margin:0 auto;padding:40px 26px}
  .hero h1{font-family:var(--serif);font-weight:normal;font-size:clamp(40px,6vw,68px);line-height:1.02;margin:0 0 8px;letter-spacing:-.5px}
  .hero h1 .amp{background:var(--hot);-webkit-background-clip:text;background-clip:text;color:transparent}
  .hero .ipa{color:var(--dim);font-size:15px;font-family:var(--mono)}
  .hero p{color:var(--dim);font-size:17px;max-width:440px;margin:18px 0 26px}
  .flagchip{position:relative;width:104px;height:62px;border-radius:8px;overflow:hidden;margin-bottom:24px;background:repeating-linear-gradient(180deg,#D7322F 0 8.86px,#F4F1EA 8.86px 17.72px);box-shadow:0 8px 26px rgba(0,0,0,.45),0 0 0 1px var(--brd)}
  .flagchip .canton{position:absolute;top:0;left:0;width:44%;height:53.4%;background:#283C7E;display:grid;place-items:center}
  .flagchip .canton b{color:#fff;font-size:8px;line-height:9px;letter-spacing:2px;white-space:pre;text-align:center;opacity:.95;font-weight:400}
  .demo{margin-top:8px;font-family:var(--serif);font-size:clamp(20px,3vw,26px);color:#fff;min-height:42px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .demo .pre{opacity:.85}
  .demo .blank{border-bottom:3px solid var(--gold);min-width:120px;padding:0 6px 3px;color:var(--gold);position:relative}
  .demo .blank.ok{border-color:var(--green);color:var(--green)}
  .demo .cur{display:inline-block;width:2px;height:1.1em;background:var(--gold);margin-left:1px;animation:blink 1s steps(1) infinite;vertical-align:-2px}
  @keyframes blink{50%{opacity:0}}
  .feat{display:flex;gap:18px;margin-top:30px;flex-wrap:wrap}
  .feat span{font-size:13px;color:var(--dim);display:flex;align-items:center;gap:7px}
  .feat .dot{width:7px;height:7px;border-radius:50%;background:var(--gold);box-shadow:0 0 10px var(--gold)}

  .logincard{background:var(--glass);border:1px solid var(--brd2);border-radius:22px;padding:32px 28px;backdrop-filter:blur(16px);
    box-shadow:0 30px 80px rgba(0,0,0,.5);position:relative;overflow:hidden}
  .logincard h2{font-family:var(--serif);font-weight:normal;font-size:24px;margin:0 0 4px}
  .logincard .sub{color:var(--dim);font-size:14px;margin-bottom:22px}
  .logincard.shake{animation:shake .4s}
  @keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-7px)}40%,80%{transform:translateX(7px)}}

  /* fields */
  .field{margin-bottom:15px}
  .field label{display:block;font-size:13px;font-weight:600;color:var(--text);margin-bottom:7px}
  .field .help{font-size:12px;color:var(--dim2);margin-top:6px}
  input,select,textarea{width:100%;border:1px solid var(--brd2);border-radius:12px;padding:12px 14px;font:inherit;font-size:14px;
    background:rgba(255,255,255,.04);color:var(--text);transition:.18s}
  input::placeholder,textarea::placeholder{color:var(--dim2)}
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 3px rgba(244,183,64,.18);background:rgba(255,255,255,.07)}
  select option{background:var(--bg2)}
  .loginerr{color:var(--red2);font-size:13px;min-height:18px;margin-top:4px}

  /* section bar */
  .secbar{display:flex;align-items:center;gap:9px;flex-wrap:wrap;margin-bottom:24px}
  .chip{padding:9px 16px;border-radius:999px;font-size:14px;border:1px solid var(--brd2);background:var(--glass);transition:.18s;display:inline-flex;align-items:center;gap:8px}
  .chip:hover{border-color:var(--gold);transform:translateY(-1px)}
  .chip[aria-pressed="true"]{background:var(--hot);color:#1c1206;border-color:transparent;font-weight:700;box-shadow:0 6px 18px rgba(234,75,75,.3)}
  .chip .x{opacity:.55;font-size:12px}.chip .x:hover{opacity:1}
  .chip.add{border-style:dashed;color:var(--dim)}
  .catinput{display:none;gap:6px}.catinput.show{display:inline-flex}
  .catinput input{width:160px;padding:9px 13px;border-radius:999px}

  .pagehead{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;margin-bottom:22px;flex-wrap:wrap}
  .pagehead h1{font-family:var(--serif);font-weight:normal;font-size:clamp(26px,4vw,34px);margin:0}
  .pagehead .ttl{display:flex;align-items:baseline;gap:12px}
  .pagehead .count{font-size:13px;color:var(--dim);background:var(--glass);border:1px solid var(--brd);padding:4px 11px;border-radius:999px}
  .pagehead p{margin:5px 0 0;color:var(--dim);font-size:14px}

  /* cards */
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(min(280px,100%),1fr));gap:18px}
  .acard{position:relative;background:var(--glass);border:1px solid var(--brd);border-radius:var(--r);padding:20px;
    display:flex;flex-direction:column;gap:11px;overflow:hidden;backdrop-filter:blur(8px);
    transition:transform .25s cubic-bezier(.2,.7,.2,1), border-color .25s, box-shadow .25s}
  .acard::after{content:"";position:absolute;inset:0;background:radial-gradient(400px 200px at var(--mx,50%) -20%,rgba(244,183,64,.10),transparent 60%);opacity:0;transition:opacity .3s;pointer-events:none}
  .acard:hover{transform:translateY(-5px);border-color:var(--brd2);box-shadow:0 18px 44px rgba(0,0,0,.4)}
  .acard:hover::after{opacity:1}
  .acard .cat{font-size:11px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;
    background:var(--hot);-webkit-background-clip:text;background-clip:text;color:transparent}
  .acard h3{font-family:var(--serif);font-weight:normal;font-size:21px;margin:0;line-height:1.2}
  .acard .meta{font-size:13px;color:var(--dim)}
  .acard .row{display:flex;gap:8px;flex-wrap:wrap;margin-top:auto;padding-top:8px}
  .ib{padding:8px 12px;border-radius:10px;font-size:13px;border:1px solid var(--brd2);background:rgba(255,255,255,.03);transition:.16s;display:inline-flex;gap:6px;align-items:center}
  .ib:hover{border-color:var(--gold);color:#fff;transform:translateY(-1px)}
  .ib.danger:hover{border-color:var(--red);color:var(--red2)}

  .empty{text-align:center;padding:64px 22px;color:var(--dim);border:1.5px dashed var(--brd2);border-radius:var(--r);background:var(--glass)}
  .empty .big{font-size:34px;display:block;margin-bottom:10px;background:var(--hot);-webkit-background-clip:text;background-clip:text;color:transparent}

  /* reveal on scroll */
  .reveal{opacity:0;transform:translateY(20px);transition:opacity .6s ease, transform .6s cubic-bezier(.2,.7,.2,1)}
  .reveal.in{opacity:1;transform:none}

  /* modal */
  .modal{position:fixed;inset:0;z-index:60;background:rgba(8,11,20,.66);backdrop-filter:blur(5px);display:none;overflow:auto;padding:24px;animation:fade .25s}
  .modal.show{display:block}
  @keyframes fade{from{opacity:0}to{opacity:1}}
  .sheet{max-width:880px;margin:0 auto;background:linear-gradient(180deg,var(--bg2),var(--bg));border:1px solid var(--brd2);border-radius:22px;
    box-shadow:0 40px 100px rgba(0,0,0,.6);overflow:hidden;animation:pop .35s cubic-bezier(.2,.8,.2,1)}
  @keyframes pop{from{opacity:0;transform:translateY(18px) scale(.98)}to{opacity:1;transform:none}}
  .sheet .shead{display:flex;align-items:center;justify-content:space-between;padding:18px 22px;border-bottom:1px solid var(--brd)}
  .sheet .shead .brand{font-size:18px}
  .sheet .body{padding:22px}
  .inline{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
  .filepick{position:relative;overflow:hidden;display:inline-block}
  .filepick input[type=file]{position:absolute;inset:0;opacity:0;width:100%;height:100%;cursor:pointer}

  .cpbox{background:rgba(255,255,255,.03);border:1px solid var(--brd);border-radius:14px;padding:18px;margin-top:14px}
  .cpbox h4{margin:0 0 14px;font-family:var(--serif);font-weight:normal;font-size:18px}
  .cplist{list-style:none;margin:14px 0 0;padding:0;display:grid;gap:8px}
  .cplist li{display:flex;align-items:center;gap:12px;background:var(--glass);border:1px solid var(--brd);border-radius:11px;padding:11px 13px}
  .cplist .t{font-family:var(--mono);color:var(--gold);font-size:13px;font-weight:700;cursor:pointer}
  .cplist .qt{flex:1;font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .cplist .del{font-size:17px;color:var(--dim)}.cplist .del:hover{color:var(--red2)}
  .nowtime{font-family:var(--mono);background:rgba(255,255,255,.04);border:1px solid var(--brd2);border-radius:10px;padding:9px 13px;font-size:14px;color:var(--gold)}
  .seg{display:inline-flex;gap:4px;background:rgba(255,255,255,.05);border:1px solid var(--brd);border-radius:11px;padding:4px;margin-bottom:14px;flex-wrap:wrap}
  .seg button{padding:8px 14px;border-radius:8px;font-size:13px;color:var(--dim);font-weight:600}
  .seg button.on{background:var(--hot);color:#1c1206}
  .optrow{display:flex;align-items:center;gap:10px;margin-bottom:8px}
  .optrow input[type=radio]{width:18px;height:18px;flex:none;accent-color:var(--gold);margin:0}
  .optrow input[type=text]{flex:1;min-width:0}
  .optrow .del{font-size:17px;color:var(--dim);flex:none}.optrow .del:hover{color:var(--red2)}

  /* player */
  .stage{position:relative;background:#070A12;border-radius:var(--r);overflow:hidden;border:1px solid var(--brd2);box-shadow:0 20px 60px rgba(0,0,0,.5)}
  .stage[hidden]{display:none}
  video{display:block;width:100%;max-height:62vh;background:#000}
  .controls{display:flex;align-items:center;gap:12px;padding:12px 14px;background:rgba(11,15,26,.9)}
  .ctrl{font-size:17px;width:40px;height:40px;border-radius:11px;display:grid;place-items:center;transition:.15s}
  .ctrl:hover{background:rgba(255,255,255,.08)}
  .time{font-family:var(--mono);font-size:13px;color:var(--dim);min-width:96px}
  .vol{width:88px;height:6px;-webkit-appearance:none;appearance:none;background:rgba(255,255,255,.18);border-radius:999px;cursor:pointer;flex:none}
  .vol::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:14px;height:14px;border-radius:50%;background:var(--gold);cursor:pointer;box-shadow:0 0 8px rgba(244,183,64,.6)}
  .vol::-moz-range-thumb{width:14px;height:14px;border:0;border-radius:50%;background:var(--gold);cursor:pointer}
  .track{flex:1;height:9px;background:rgba(255,255,255,.08);border-radius:999px;position:relative;cursor:pointer}
  .track .played{position:absolute;left:0;top:0;bottom:0;background:var(--hot);border-radius:999px;width:0}
  .track .marker{position:absolute;top:-3px;width:3px;height:15px;background:#fff;border-radius:2px;transform:translateX(-50%);opacity:.55}
  .track .marker.done{background:var(--green);opacity:1;box-shadow:0 0 8px var(--green)}
  .stage[data-locked="true"] .track{cursor:default}
  .vstatus{font-size:13px;padding:11px 14px;display:none;align-items:center;gap:9px;background:rgba(11,15,26,.9);border-top:1px solid var(--brd);color:var(--dim)}
  .vstatus.show{display:flex}.vstatus.ok{color:#7fd6ab}.vstatus.err{color:var(--red2)}
  .spin{width:14px;height:14px;border:2px solid rgba(255,255,255,.18);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite;flex:none}
  @keyframes spin{to{transform:rotate(360deg)}}

  /* quiz overlay */
  .overlay{position:absolute;inset:0;display:none;padding:16px;background:rgba(7,10,18,.88);backdrop-filter:blur(6px);overflow-y:auto;-webkit-overflow-scrolling:touch}
  .overlay.show{display:flex;animation:fade .25s}
  .qcard{background:linear-gradient(180deg,rgba(26,32,52,.96),rgba(16,20,33,.96));border:1px solid var(--brd2);border-radius:20px;
    padding:28px 26px;width:min(560px,100%);margin:auto;box-shadow:0 30px 70px rgba(0,0,0,.6);animation:pop .3s cubic-bezier(.2,.8,.2,1)}
  .qcard .step{font-size:11px;letter-spacing:.14em;text-transform:uppercase;font-weight:800;background:var(--hot);-webkit-background-clip:text;background-clip:text;color:transparent}
  .qcard .q{font-family:var(--serif);font-size:22px;line-height:1.35;margin:9px 0 22px}
  .blankfield{display:block;width:100%;font-family:var(--serif);font-size:25px;text-align:center;color:var(--text);
    background:transparent;border:0;border-bottom:3px solid var(--gold);border-radius:0;padding:6px 4px 9px}
  .blankfield:focus{outline:none;box-shadow:none;border-bottom-color:var(--red2)}
  .blankfield.correct{border-bottom-color:var(--green);color:var(--green)}
  .qcard .feedback{min-height:22px;margin:15px 0 4px;font-size:14px}
  .feedback.bad{color:var(--red2)}.feedback.good{color:var(--green);font-weight:700}
  .qcard .actions{display:flex;gap:12px;align-items:center;margin-top:8px;flex-wrap:wrap}
  .hintbtn{color:var(--gold);font-size:13px;text-decoration:underline}
  .hinttext{font-size:13px;color:var(--dim);margin-top:8px;display:none}

  /* choices (тест) */
  .choices{display:none;flex-direction:column;gap:10px;margin:4px 0 14px}
  .choices.show{display:flex}
  .opt{text-align:left;padding:13px 16px;border-radius:12px;border:1px solid var(--brd2);background:rgba(255,255,255,.04);color:var(--text);font-size:16px;font-family:var(--serif);transition:.15s;width:100%}
  .opt:hover{border-color:var(--gold)}
  .opt.sel{border-color:var(--gold);background:rgba(244,183,64,.16)}
  .opt.correct{border-color:var(--green);background:rgba(52,199,123,.18);color:#bff0d6}
  .opt.wrong{border-color:var(--red);background:rgba(234,75,75,.16)}

  /* fullscreen */
  .stage:fullscreen,.stage.fs{width:100vw;height:100vh;height:100dvh;border:0;border-radius:0;display:flex;flex-direction:column;background:#000}
  .stage.fs{position:fixed;inset:0;z-index:9999}
  .stage:-webkit-full-screen{width:100vw;height:100vh;border:0;border-radius:0;background:#000}
  .stage:fullscreen video,.stage.fs video{flex:1;min-height:0;max-height:none;width:100%;object-fit:contain}

  /* student */
  .swrap{max-width:840px;margin:0 auto}
  .skicker{font-size:11px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;background:var(--hot);-webkit-background-clip:text;background-clip:text;color:transparent}
  .swrap h2{font-family:var(--serif);font-weight:normal;font-size:clamp(26px,4vw,34px);margin:6px 0 4px}
  .swrap .lead{color:var(--dim);font-size:14px;margin-bottom:18px}
  .sprog{height:6px;background:rgba(255,255,255,.08);border-radius:999px;overflow:hidden;margin:0 0 14px}
  .sprog i{display:block;height:100%;width:0;background:var(--hot);transition:width .5s cubic-bezier(.2,.7,.2,1)}

  /* monitor + name gate */
  .mon{display:grid;gap:12px}
  .mcard{display:flex;align-items:center;gap:12px;background:var(--glass);border:1px solid var(--brd);border-radius:14px;padding:14px 16px;flex-wrap:wrap}
  .mcard.off{opacity:.45}
  .mcard .nm{font-family:var(--serif);font-size:18px}
  .mstat{font-size:12px;font-weight:700;padding:5px 11px;border-radius:999px;border:1px solid var(--brd2)}
  .mstat.watch{color:var(--blue);border-color:rgba(92,141,246,.5);background:rgba(92,141,246,.12)}
  .mstat.q{color:var(--gold);border-color:rgba(244,183,64,.5);background:rgba(244,183,64,.12)}
  .mstat.ok{color:var(--green);border-color:rgba(52,199,123,.5);background:rgba(52,199,123,.14)}
  .mstat.bad{color:var(--red2);border-color:rgba(234,75,75,.5);background:rgba(234,75,75,.14)}
  .mpos{font-family:var(--mono);font-size:13px;color:var(--dim)}
  .mseen{font-size:11px;color:var(--dim2);margin-left:auto}
  .mq{flex-basis:100%;font-size:13px;color:var(--dim)}
  .mq b{color:var(--text);font-weight:600}

<script>
(function(){
  "use strict";

  /* ===== Firebase проект ===== */

  const DB="https://allias-6fa5f-default-rtdb.firebaseio.com/stopwrite.json"; let mem=null;

  async function signIn(email,password){const r=await fetch("https://identitytoolkit.googleapis.com/v1/accounts:signInWithPassword?key="+API_KEY,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({email:email,password:password,returnSecureToken:true})});const j=await r.json();if(!r.ok)throw new Error((j.error&&j.error.message)||"AUTH_FAILED");session={idToken:j.idToken,refreshToken:j.refreshToken,expiresAt:Date.now()+(+j.expiresIn-60)*1000};try{localStorage.setItem("sw_rt",session.refreshToken);}catch(e){}return session;}
  async function restore(){let rt;try{rt=localStorage.getItem("sw_rt");}catch(e){}if(!rt)return false;try{const r=await fetch("https://securetoken.googleapis.com/v1/token?key="+API_KEY,{method:"POST",headers:{"Content-Type":"application/x-www-form-urlencoded"},body:"grant_type=refresh_token&refresh_token="+encodeURIComponent(rt)});const j=await r.json();if(r.ok&&j.id_token){session={idToken:j.id_token,refreshToken:j.refresh_token,expiresAt:Date.now()+(+j.expires_in-60)*1000};try{localStorage.setItem("sw_rt",session.refreshToken);}catch(e){}return true;}}catch(e){}try{localStorage.removeItem("sw_rt");}catch(e){}return false;}
  async function getToken(){if(!session)return null;if(Date.now()<session.expiresAt)return session.idToken;try{const r=await fetch("https://securetoken.googleapis.com/v1/token?key="+API_KEY,{method:"POST",headers:{"Content-Type":"application/x-www-form-urlencoded"},body:"grant_type=refresh_token&refresh_token="+encodeURIComponent(session.refreshToken)});const j=await r.json();if(r.ok){session.idToken=j.id_token;session.refreshToken=j.refresh_token;session.expiresAt=Date.now()+(+j.expires_in-60)*1000;try{localStorage.setItem("sw_rt",session.refreshToken);}catch(e){}}}catch(e){}return session.idToken;}
  function seed(){const cat={id:uid(),name:"Времена глагола"};return{categories:[cat,{id:uid(),name:"Лексика"}],assignments:[{id:uid(),title:"Past Simple — короткая история",categoryId:cat.id,videoUrl:"https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/BigBuckBunny.mp4",checkpoints:[{id:uid(),time:6,question:"Past Simple: Yesterday I ___ a film. (watch)",answers:["watched"],hint:"окончание -ed"},{id:uid(),time:14,question:"Past Simple: She ___ to school. (go)",answers:["went"],hint:"go — неправильный глагол"}],createdAt:Date.now()}]};}

  let state=null, route={view:"tutor"}, filterCat="all", authed=false;

  /* ===== live sessions (ученик пишет прогресс, учитель смотрит) ===== */
  const SROOT="https://allias-6fa5f-default-rtdb.firebaseio.com/sessions";
  let liveSession=null,lastRep=0,monES=null,monTimer=null,monData={},monAid=null,sync=null;
  function report(extra){if(!liveSession)return;const body=Object.assign({name:liveSession.name,updated:Date.now()},extra);try{fetch(SROOT+"/"+liveSession.aid+"/"+liveSession.sid+".json",{method:"PATCH",headers:{"Content-Type":"application/json"},body:JSON.stringify(body),keepalive:true});}catch(e){}}
  function closeMon(){if(monES){try{monES.close();}catch(e){}monES=null;}if(monTimer){clearInterval(monTimer);monTimer=null;}}
  function setPath(obj,path,data){if(path==="/"||path===""){return (data&&typeof data==="object")?data:{};}const parts=path.split("/").filter(Boolean);let o=obj;for(let i=0;i<parts.length-1;i++){if(typeof o[parts[i]]!=="object"||o[parts[i]]===null)o[parts[i]]={};o=o[parts[i]];}const last=parts[parts.length-1];if(data===null)delete o[last];else o[last]=data;return obj;}
  function detachSync(){if(sync){if(sync.es){try{sync.es.close();}catch(e){}}sync=null;}}
  function attachSync(aid,sid,role,onState){
    detachSync();
    sync={aid:aid,sid:sid,role:role,suppress:false,lastTs:0,lastBroad:0,state:{},onState:onState||null};
    const handle=()=>{const c=sync.state&&sync.state.ctrl;if(c&&c.by!==sync.role&&(c.ts||0)>sync.lastTs){sync.lastTs=c.ts||0;applyCtrl(c);}if(sync.onState)sync.onState(sync.state||{});};
    try{
      const es=new EventSource(SROOT+"/"+aid+"/"+sid+".json");
      es.addEventListener("put",e=>{try{const m=JSON.parse(e.data);sync.state=setPath(sync.state,m.path,m.data);handle();}catch(x){}});
      es.addEventListener("patch",e=>{try{const m=JSON.parse(e.data);const base=m.path==="/"?"":m.path;for(const k in m.data)sync.state=setPath(sync.state,base+"/"+k,m.data[k]);handle();}catch(x){}});
      sync.es=es;
    }catch(e){}
  }
  function applyCtrl(c){if(!sync)return;sync.suppress=true;try{if(typeof c.t==="number"&&Math.abs((video.currentTime||0)-c.t)>1.2)video.currentTime=c.t;if(c.playing&&video.paused)video.play().catch(()=>{});else if(!c.playing&&!video.paused)video.pause();}catch(e){}setTimeout(()=>{if(sync)sync.suppress=false;},350);}
  function broadcastCtrl(playing){if(!sync||sync.suppress)return;const ts=Date.now();sync.lastTs=ts;sync.lastBroad=ts;const body={playing:!!playing,t:Math.floor(video.currentTime||0),by:sync.role,ts:ts};try{fetch(SROOT+"/"+sync.aid+"/"+sync.sid+"/ctrl.json",{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify(body),keepalive:true});}catch(e){}}

  /* ===== player ===== */
  const stage=$("#stage"),video=$("#video"),overlay=$("#overlay"),qText=$("#qText"),stepLabel=$("#stepLabel");
  const answer=$("#answer"),feedback=$("#feedback"),hintBtn=$("#hintBtn"),hintText=$("#hintText");
  const playBtn=$("#play"),muteBtn=$("#mute"),track=$("#track"),played=$("#played"),timeEl=$("#time"),vstatus=$("#vstatus"),fsBtn=$("#fs"),choicesEl=$("#choices"),volEl=$("#vol");
  let curAsg=null,quizOn=false,done=new Set(),active=null,maxReached=0,loadTimer=null,selectedOpt=null;

  function setStatus(t,k){vstatus.className="vstatus show "+(k||"");vstatus.innerHTML=(k==="ok"||k==="err"?"":'<span class="spin"></span>')+'<span class="m"></span>';vstatus.querySelector(".m").textContent=t;}
  function hideStatus(){vstatus.className="vstatus";}

  function mountPlayer(slot,asg,mode){curAsg=asg;quizOn=(mode==="play");done=new Set();active=null;maxReached=0;overlay.classList.remove("show");stage.dataset.locked=(mode==="play");stage.hidden=false;slot.appendChild(stage);if(asg.videoUrl)loadSrc(asg.videoUrl);else{hideStatus();video.removeAttribute("src");video.load();}renderMarkers();updateProg();}
  function unmountPlayer(){try{video.pause();}catch(e){}stage.classList.remove("fs");stage.hidden=true;document.body.appendChild(stage);}
  async function yandexCandidates(raw){
    const out=[];
    if(location.protocol==="http:"||location.protocol==="https:"){
      out.push("/yadisk?link="+encodeURIComponent(raw));
      out.push("/.netlify/functions/yadisk?link="+encodeURIComponent(raw));
    }
    const api="https://cloud-api.yandex.net/v1/disk/public/resources/download?public_key="+encodeURIComponent(raw);
    try{const r=await fetch(api);if(r.ok){const j=await r.json();if(j&&j.href)out.push(j.href);}}catch(e){}
    try{const r=await fetch("https://api.allorigins.win/raw?url="+encodeURIComponent(api));if(r.ok){const j=await r.json();if(j&&j.href)out.push(j.href);}}catch(e){}
    out.push("https://getfile.dokpub.com/yandex/get/"+raw);
    return out;
  }
  let fbActive=false,fbList=[],fbIdx=0,fbT=null;
  function fbTry(){
    if(fbIdx>=fbList.length){fbActive=false;setStatus("Не удалось открыть видео. Убедись, что файл на Диске открыт по ссылке и это MP4 (H.264).","err");return;}
    const u=fbList[fbIdx++];
    setStatus("Подключаю видео…","");
    const onOk=()=>{cleanup();fbActive=false;};
    const onErr=()=>{cleanup();setTimeout(fbTry,40);};
    function cleanup(){video.removeEventListener("loadeddata",onOk);video.removeEventListener("error",onErr);if(fbT){clearTimeout(fbT);fbT=null;}}
    video.addEventListener("loadeddata",onOk,{once:true});
    video.addEventListener("error",onErr,{once:true});
    fbT=setTimeout(()=>{cleanup();onErr();},12000);
    video.src=u;video.load();
  }
  async function loadSrc(raw){
    clearWD();fbActive=false;setStatus("Загружаю видео…","");
    if(/disk\.yandex\.|yadi\.sk/i.test(raw)){
      setStatus("Получаю видео с Яндекс Диска…","");
      const cands=await yandexCandidates(raw);
      fbActive=true;fbList=cands;fbIdx=0;renderMarkers();fbTry();
      return;
    }
    let src=raw;
    if(/drive\.google\.com/.test(raw)){const gd=raw.match(/\/file\/d\/([^/]+)/)||raw.match(/[?&]id=([a-zA-Z0-9_-]+)/);if(gd)src="https://drive.google.com/uc?export=download&id="+gd[1];}
    video.src=src;video.load();renderMarkers();
    loadTimer=setTimeout(()=>{if(!video.duration||isNaN(video.duration))setStatus("Долго не загружается. Проверь, что это прямая ссылка на .mp4 и хостинг доступен в твоём регионе.","err");},15000);
  }
  function renderMarkers(){track.querySelectorAll(".marker").forEach(m=>m.remove());const dur=video.duration;if(!dur||!curAsg)return;curAsg.checkpoints.forEach(c=>{const m=document.createElement("div");m.className="marker"+(done.has(c.id)?" done":"");m.style.left=(c.time/dur*100)+"%";track.appendChild(m);});}
  function updateTime(){const cur=video.currentTime||0,dur=video.duration||0;timeEl.textContent=fmt(cur)+" / "+fmt(dur);played.style.width=dur?(cur/dur*100)+"%":"0%";}

  playBtn.addEventListener("click",()=>{if(active)return;video.paused?video.play():video.pause();});

  volEl.addEventListener("input",()=>{const v=+volEl.value;video.volume=v;video.muted=(v===0);muteBtn.textContent=video.muted?"🔇":"🔊";});
  function enterFs(){stage.classList.add("fs");fsBtn.textContent="🗗";if(stage.requestFullscreen)stage.requestFullscreen().catch(()=>{});else if(stage.webkitRequestFullscreen){try{stage.webkitRequestFullscreen();}catch(e){}}}

  track.addEventListener("click",e=>{const dur=video.duration;if(!dur)return;const r=track.getBoundingClientRect();const tgt=Math.max(0,Math.min(1,(e.clientX-r.left)/r.width))*dur;if(quizOn&&tgt>maxReached+0.5)return;video.currentTime=tgt;});
  video.addEventListener("timeupdate",()=>{maxReached=Math.max(maxReached,video.currentTime);updateTime();if(liveSession&&!active){const _n=Date.now();if(_n-lastRep>1500){lastRep=_n;report({t:Math.floor(video.currentTime),dur:Math.floor(video.duration||0),status:"watching"});}}if(sync&&!sync.suppress&&!video.paused){const _t=Date.now();if(_t-sync.lastBroad>3000)broadcastCtrl(true);}if(!quizOn||active||!curAsg)return;const due=curAsg.checkpoints.filter(c=>!done.has(c.id)&&video.currentTime>=c.time-0.05).sort((a,b)=>a.time-b.time)[0];if(due)trigger(due);});
  video.addEventListener("loadstart",()=>setStatus("Загружаю видео…",""));

  function trigger(cp){
    active=cp;video.pause();

  const norm=s=>(s||"").toLowerCase().trim().replace(/[’`]/g,"'").replace(/\s+/g," ").replace(/[.!?]+$/,"");
  function submit(){

      ok=active.answers.map(norm).includes(norm(selectedOpt));

      ok=active.answers.map(norm).includes(g);
    }
    if(ok){
      if(isChoice){choicesEl.querySelectorAll(".opt").forEach(x=>{if(norm(x.textContent)===norm(selectedOpt))x.classList.add("correct");});}

  function renderMon(){

  function onClick(e){const b=e.target.closest("[data-act]");if(!b)return;const[act,arg]=b.dataset.act.split(":");
    if(act==="logout"){authed=false;session=null;try{localStorage.removeItem("sw_rt");}catch(e){}location.hash="";route={view:"tutor"};render();}
    else if(act==="filter"){filterCat=arg;render();}
    else if(act==="addcat"){$("#catInput").classList.add("show");$("#catName").focus();}
    else if(act==="savecat"){const v=$("#catName").value.trim();if(v){state.categories.push({id:uid(),name:v});saveData();render();}}
    else if(act==="delcat"){e.stopPropagation();const n=state.assignments.filter(x=>x.categoryId===arg).length;if(n){toast("Сначала перенеси задания из этого раздела");return;}state.categories=state.categories.filter(c=>c.id!==arg);if(filterCat===arg)filterCat="all";saveData();render();}
    else if(act==="new")openEditor(null);
    else if(act==="edit")openEditor(findAsg(arg));
    else if(act==="play"){route={view:"student",id:arg,preview:true};render();}
    else if(act==="invite")toast("Ссылка для ученика:",inviteLink(arg));
    else if(act==="live"){route={view:"monitor",id:arg};render();}
    else if(act==="cowatch"){const p=arg.split("~");route={view:"cowatch",aid:p[0],sid:p[1]};render();}
    else if(act==="clearmon"){try{fetch(SROOT+"/"+arg+".json",{method:"DELETE"});}catch(e){}monData={};renderMon();}
    else if(act==="del"){state.assignments=state.assignments.filter(x=>x.id!==arg);saveData();render();}
    else if(act==="back"){route={view:"tutor"};render();}
  }
  document.addEventListener("click",onClick);
  document.addEventListener("keydown",e=>{if(e.target&&e.target.id==="catName"&&e.key==="Enter"){const v=e.target.value.trim();if(v){state.categories.push({id:uid(),name:v});saveData();render();}}});

  /* ===== router ===== */
  function render(){
    if(route.view!=="student")liveSession=null;
    if(route.view!=="student"&&route.view!=="cowatch")detachSync();
    if(route.view!=="monitor")closeMon();
    if(route.view==="student"){const a=findAsg(route.id);if(a){renderStudent(a,route.preview&&authed);return;}route={view:"tutor"};}
    if(!authed){renderLogin();return;}
    if(route.view==="monitor"){renderMonitor(route.id);return;}
    if(route.view==="cowatch"){renderCowatch(route.aid,route.sid);return;}
    renderTutor();
  }
  function applyHash(){const m=location.hash.match(/a=([a-z0-9]+)/i);if(m&&state&&findAsg(m[1])){route={view:"student",id:m[1],preview:false};}else{route={view:"tutor"};}}
  window.addEventListener("hashchange",()=>{applyHash();render();});

  /* ===== boot ===== */
  (async function(){const loaded=await loadData();state=loaded||seed();authed=await restore();applyHash();render();})();
})();
</script>
</body>
</html>
