<style>
  :root{
    --bg:#0F1320; --bg2:#141A2B; --bg3:#0B0F1A;
    --text:#F2EFE9; --dim:#98A1B8; --dim2:#6E768C;
    --glass:rgba(255,255,255,.045); --brd:rgba(255,255,255,.10); --brd2:rgba(255,255,255,.16);
    --red:#EA4B4B; --red2:#FF6A5A; --gold:#F4B740; --blue:#5C8DF6; --violet:#8B6BF0; --green:#34C77B;
    --hot:linear-gradient(135deg,#EA4B4B 0%,#F4B740 100%);
    --cool:linear-gradient(135deg,#3D6FE0 0%,#8B6BF0 100%);
    --r:16px;
    --serif:Georgia,"Times New Roman",serif;
    --sans:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
    --mono:ui-monospace,"SF Mono",Menlo,Consolas,monospace;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    background:var(--bg); color:var(--text); font-family:var(--sans); line-height:1.55;
    min-height:100vh; -webkit-font-smoothing:antialiased; overflow-x:hidden; position:relative;
  }
  button{font:inherit;cursor:pointer;color:inherit;border:0;background:none}
  ::selection{background:rgba(244,183,64,.3)}

  /* animated background */
  .bgfx{position:fixed;inset:0;z-index:-2;background:
    radial-gradient(1100px 700px at 12% -5%, rgba(92,141,246,.16), transparent 60%),
    radial-gradient(1000px 700px at 95% 0%, rgba(234,75,75,.16), transparent 55%),
    linear-gradient(180deg,var(--bg) 0%, var(--bg3) 100%);}
  .blob{position:fixed;z-index:-1;border-radius:50%;filter:blur(70px);opacity:.5;pointer-events:none}
  .blob.a{width:460px;height:460px;background:radial-gradient(circle,#EA4B4B,transparent 70%);top:-120px;right:-80px;animation:float1 18s ease-in-out infinite}
  .blob.b{width:420px;height:420px;background:radial-gradient(circle,#5C8DF6,transparent 70%);bottom:-140px;left:-100px;animation:float2 22s ease-in-out infinite}
  .blob.c{width:300px;height:300px;background:radial-gradient(circle,#F4B740,transparent 70%);top:40%;left:60%;opacity:.25;animation:float1 26s ease-in-out infinite reverse}
  @keyframes float1{0%,100%{transform:translate(0,0)}50%{transform:translate(-40px,40px)}}
  @keyframes float2{0%,100%{transform:translate(0,0)}50%{transform:translate(50px,-30px)}}
  .stars{position:fixed;inset:0;z-index:-1;pointer-events:none}
  .stars i{position:absolute;width:2px;height:2px;background:#fff;border-radius:50%;opacity:.6;animation:tw 3s ease-in-out infinite}
  @keyframes tw{0%,100%{opacity:.15}50%{opacity:.85}}

  /* chrome / header */
  header{position:sticky;top:0;z-index:30;display:flex;align-items:center;justify-content:space-between;gap:16px;
    padding:14px 24px;border-bottom:1px solid var(--brd);background:rgba(15,19,32,.7);backdrop-filter:blur(14px)}
  header.hidden{display:none}
  .brand{display:flex;align-items:center;gap:11px;font-family:var(--serif);font-size:22px;letter-spacing:.2px}
  .brand .mark{width:36px;height:36px;border-radius:10px;background:var(--hot);display:grid;place-items:center;color:#1a1208;font-weight:800;font-size:15px;letter-spacing:.3px;font-family:var(--sans);box-shadow:0 6px 18px rgba(234,75,75,.4)}
  .brand b{font-weight:normal} .brand .amp{color:var(--gold)}
  .brand .ipa{font-family:var(--sans);font-size:12px;color:var(--dim);margin-left:2px}
  .hbtn{padding:9px 15px;border-radius:11px;font-size:13px;font-weight:600;border:1px solid var(--brd2);background:var(--glass);transition:.18s}
  .hbtn:hover{border-color:var(--gold);color:#fff;transform:translateY(-1px)}
  .badge{font-size:12px;font-weight:700;padding:7px 13px;border-radius:999px;background:rgba(234,75,75,.15);color:var(--red2);border:1px solid rgba(234,75,75,.4)}

  .wrap{max-width:1040px;margin:0 auto;padding:30px 22px 90px}
  .viewroot{animation:viewIn .5s cubic-bezier(.2,.7,.2,1)}
  @keyframes viewIn{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}

  /* buttons */
  .btn{position:relative;display:inline-flex;align-items:center;gap:8px;padding:12px 20px;border-radius:12px;font-size:14px;font-weight:700;
    background:var(--hot);color:#1c1206;box-shadow:0 8px 24px rgba(234,75,75,.32);transition:transform .12s, box-shadow .2s, filter .2s;overflow:hidden}
  .btn:hover{transform:translateY(-2px);box-shadow:0 12px 30px rgba(234,75,75,.45);filter:brightness(1.05)}
  .btn:active{transform:translateY(0)}
  .btn.cool{background:var(--cool);color:#fff;box-shadow:0 8px 24px rgba(92,141,246,.34)}
  .btn.ghost{background:var(--glass);color:var(--text);border:1px solid var(--brd2);box-shadow:none}
  .btn.ghost:hover{border-color:var(--gold)}
  .btn.go{background:linear-gradient(135deg,#34C77B,#22A86A);color:#062417;box-shadow:0 8px 24px rgba(52,199,123,.3)}
  .btn.sm{padding:9px 14px;font-size:13px;border-radius:10px}
  .btn .sheen{position:absolute;top:0;left:-120%;width:60%;height:100%;background:linear-gradient(100deg,transparent,rgba(255,255,255,.5),transparent);transform:skewX(-18deg);transition:left .6s}
  .btn:hover .sheen{left:140%}

  /* login / hero */
  .auth{min-height:100vh;display:grid;grid-template-columns:1.05fr .95fr;align-items:center;gap:30px;max-width:1100px;margin:0 auto;padding:40px 26px}
  .hero h1{font-family:var(--serif);font-weight:normal;font-size:clamp(40px,6vw,68px);line-height:1.02;margin:0 0 8px;letter-spacing:-.5px}
  .hero h1 .amp{background:var(--hot);-webkit-background-clip:text;background-clip:text;color:transparent}
  .hero .ipa{color:var(--dim);font-size:15px;font-family:var(--mono)}
  .hero p{color:var(--dim);font-size:17px;max-width:440px;margin:18px 0 26px}
  .flagchip{position:relative;width:104px;height:62px;border-radius:8px;overflow:hidden;margin-bottom:24px;background:repeating-linear-gradient(180deg,#D7322F 0 8.86px,#F4F1EA 8.86px 17.72px);box-shadow:0 8px 26px rgba(0,0,0,.45),0 0 0 1px var(--brd)}
  .flagchip .canton{position:absolute;top:0;left:0;width:44%;height:53.4%;background:#283C7E;display:grid;place-items:center}
  .flagchip .canton b{color:#fff;font-size:8px;line-height:9px;letter-spacing:2px;white-space:pre;text-align:center;opacity:.95;font-weight:400}
  .demo{margin-top:8px;font-family:var(--serif);font-size:clamp(20px,3vw,26px);color:#fff;min-height:42px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .demo .pre{opacity:.85}
  .demo .blank{border-bottom:3px solid var(--gold);min-width:120px;padding:0 6px 3px;color:var(--gold);position:relative}
  .demo .blank.ok{border-color:var(--green);color:var(--green)}
  .demo .cur{display:inline-block;width:2px;height:1.1em;background:var(--gold);margin-left:1px;animation:blink 1s steps(1) infinite;vertical-align:-2px}
  @keyframes blink{50%{opacity:0}}
  .feat{display:flex;gap:18px;margin-top:30px;flex-wrap:wrap}
  .feat span{font-size:13px;color:var(--dim);display:flex;align-items:center;gap:7px}
  .feat .dot{width:7px;height:7px;border-radius:50%;background:var(--gold);box-shadow:0 0 10px var(--gold)}

  .logincard{background:var(--glass);border:1px solid var(--brd2);border-radius:22px;padding:32px 28px;backdrop-filter:blur(16px);
    box-shadow:0 30px 80px rgba(0,0,0,.5);position:relative;overflow:hidden}
  .logincard h2{font-family:var(--serif);font-weight:normal;font-size:24px;margin:0 0 4px}
  .logincard .sub{color:var(--dim);font-size:14px;margin-bottom:22px}
  .logincard.shake{animation:shake .4s}
  @keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-7px)}40%,80%{transform:translateX(7px)}}

  /* fields */
  .field{margin-bottom:15px}
  .field label{display:block;font-size:13px;font-weight:600;color:var(--text);margin-bottom:7px}
  .field .help{font-size:12px;color:var(--dim2);margin-top:6px}
  input,select,textarea{width:100%;border:1px solid var(--brd2);border-radius:12px;padding:12px 14px;font:inherit;font-size:14px;
    background:rgba(255,255,255,.04);color:var(--text);transition:.18s}
  input::placeholder,textarea::placeholder{color:var(--dim2)}
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 3px rgba(244,183,64,.18);background:rgba(255,255,255,.07)}
  select option{background:var(--bg2)}
  .loginerr{color:var(--red2);font-size:13px;min-height:18px;margin-top:4px}

  /* section bar */
  .secbar{display:flex;align-items:center;gap:9px;flex-wrap:wrap;margin-bottom:24px}
  .chip{padding:9px 16px;border-radius:999px;font-size:14px;border:1px solid var(--brd2);background:var(--glass);transition:.18s;display:inline-flex;align-items:center;gap:8px}
  .chip:hover{border-color:var(--gold);transform:translateY(-1px)}
  .chip[aria-pressed="true"]{background:var(--hot);color:#1c1206;border-color:transparent;font-weight:700;box-shadow:0 6px 18px rgba(234,75,75,.3)}
  .chip .x{opacity:.55;font-size:12px}.chip .x:hover{opacity:1}
  .chip.add{border-style:dashed;color:var(--dim)}
  .catinput{display:none;gap:6px}.catinput.show{display:inline-flex}
  .catinput input{width:160px;padding:9px 13px;border-radius:999px}

  .pagehead{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;margin-bottom:22px;flex-wrap:wrap}
  .pagehead h1{font-family:var(--serif);font-weight:normal;font-size:clamp(26px,4vw,34px);margin:0}
  .pagehead .ttl{display:flex;align-items:baseline;gap:12px}

        <p>Как тебя зовут? Имя увидит преподаватель, чтобы понимать, кто отвечает.</p>
        <div class="field"><input type="text" id="nmIn" placeholder="Например: Маша" maxlength="40"></div>
        <button class="btn" id="nmBtn" style="width:100%;justify-content:center"><span class="sheen"></span>Начать</button>
      </div></div>`;
      const go=()=>{const v=$("#nmIn").value.trim();if(!v){$("#nmIn").focus();return;}try{localStorage.setItem("sw_name",v);}catch(e){}renderStudent(asg,preview);};
      $("#nmBtn").addEventListener("click",go);
      $("#nmIn").addEventListener("keydown",e=>{if(e.key==="Enter")go();});
      setTimeout(()=>{const i=$("#nmIn");if(i)i.focus();},60);
      return;
    }
    if(live){let cid;try{cid=localStorage.getItem("sw_cid");}catch(e){}if(!cid){cid="s"+uid()+uid();try{localStorage.setItem("sw_cid",cid);}catch(e){}}liveSession={aid:asg.id,sid:cid,name:nm};lastRep=0;}
    else liveSession=null;
    root.innerHTML=`
    <div class="viewroot wrap"><div class="swrap">
      ${preview?'<button class="btn ghost sm" data-act="back" style="margin-bottom:18px">← Назад в кабинет</button>':''}
      <div class="skicker">${esc(catName(asg.categoryId))}</div>
      <h2>${esc(asg.title)}</h2>
      <div class="lead">Смотри видео. На остановках впиши правильный английский ответ, чтобы продолжить.</div>
      <div class="sprog"><i></i></div>
      <div id="pslot"></div>
    </div></div>`;
    mountPlayer($("#pslot"),asg,"play");
    if(live){report({status:"watching",t:0,dur:Math.floor(video.duration||0)});attachSync(asg.id,liveSession.sid,"student");}
  }

  /* ===== monitor (живой эфир) ===== */
  function renderMonitor(aid){
    closeMon();setChrome("tutor");demoTok++;liveSession=null;detachSync();monData={};monAid=aid;
    const asg=findAsg(aid);
    root.innerHTML=`<div class="viewroot wrap">
      <button class="btn ghost sm" data-act="back" style="margin-bottom:16px">← Назад в кабинет</button>
      <div class="pagehead"><div><h1>Кто сейчас занимается</h1><p>${esc(asg?asg.title:"")} · обновляется в реальном времени</p></div>
      <button class="ib danger" data-act="clearmon:${aid}">Очистить список</button></div>
      <div class="mon" id="monList"></div></div>`;
    renderMon();
    try{
      monES=new EventSource(SROOT+"/"+aid+".json");
      monES.addEventListener("put",e=>{try{const m=JSON.parse(e.data);monData=setPath(monData,m.path,m.data);renderMon();}catch(x){}});
      monES.addEventListener("patch",e=>{try{const m=JSON.parse(e.data);const base=m.path==="/"?"":m.path;for(const k in m.data){monData=setPath(monData,base+"/"+k,m.data[k]);}renderMon();}catch(x){}});
    }catch(e){}
    monTimer=setInterval(renderMon,2000);
  }
  function renderMon(){
    const list=$("#monList");if(!list)return;const now=Date.now();
    const arr=Object.keys(monData||{}).map(k=>({sid:k,s:monData[k]})).filter(o=>o.s&&typeof o.s==="object");
    arr.sort((a,b)=>(b.s.updated||0)-(a.s.updated||0));
    const vis=arr.filter(o=>now-(o.s.updated||0)<600000);
    if(!vis.length){list.innerHTML='<div class="empty">Пока никто не открыл это задание. Как только ученик зайдёт по ссылке — он появится здесь.</div>';return;}
    list.innerHTML=vis.map(o=>{const s=o.s;
      const age=now-(s.updated||0),off=age>25000;
      let st="watch",lbl="Смотрит";
      if(s.status==="question"){st="q";lbl="Отвечает";}else if(s.status==="ok"){st="ok";lbl="Ответил верно";}else if(s.status==="bad"){st="bad";lbl="Ошибся";}
      const pos=fmt(s.t||0)+(s.dur?(" / "+fmt(s.dur)):"");
      const seen=off?("не в сети · "+Math.floor(age/1000)+"с"):"в сети";
      let qline="";
      if(s.q&&/question|ok|bad/.test(s.status||"")){qline=`<div class="mq">Вопрос ${s.step||""}${s.total?("/"+s.total):""}: ${esc(s.q)}`;if(s.lastAnswer!=null&&s.lastAnswer!=="")qline+=` — ответ: <b>${esc(s.lastAnswer)}</b> ${s.lastCorrect?"✓":"✗"}`;qline+=`</div>`;}
      return `<div class="mcard ${off?"off":""}"><span class="nm">${esc(s.name||"Ученик")}</span><span class="mstat ${st}">${lbl}</span><span class="mpos">${pos}</span><button class="ib" data-act="cowatch:${monAid}~${o.sid}">▶ Смотреть вместе</button><span class="mseen">${seen}</span>${qline}</div>`;
    }).join("");
  }
  function renderCowatch(aid,sid){
    closeMon();setChrome("tutor");demoTok++;liveSession=null;
    const asg=findAsg(aid);
    if(!asg){route={view:"tutor"};render();return;}
    root.innerHTML=`<div class="viewroot wrap"><div class="swrap">
      <button class="btn ghost sm" data-act="live:${aid}" style="margin-bottom:16px">← К списку учеников</button>
      <div class="skicker">Совместный просмотр</div>
      <h2 id="cwName">Ученик</h2>
      <div class="lead">Плеер синхронизирован: пауза, плей и перемотка с любой стороны повторяются у обоих.</div>
      <div id="cwStrip" class="cwstrip"></div>
      <div id="pslot"></div>
    </div></div>`;
    mountPlayer($("#pslot"),asg,"watch");
    attachSync(aid,sid,"teacher",function(stt){
      stt=stt||{};
      const nameEl=$("#cwName");if(nameEl&&stt.name)nameEl.textContent=stt.name;
      const strip=$("#cwStrip");if(!strip)return;
      let lbl="Смотрит",cls="watch";
      if(stt.status==="question"){lbl="Отвечает на вопрос";cls="q";}else if(stt.status==="ok"){lbl="Ответил верно";cls="ok";}else if(stt.status==="bad"){lbl="Ошибся";cls="bad";}
      let q="";if(stt.q&&/question|ok|bad/.test(stt.status||"")){q=esc(stt.q);if(stt.lastAnswer)q+=" → "+esc(stt.lastAnswer)+(stt.lastCorrect?" ✓":" ✗");}
      strip.innerHTML=`<span class="mstat ${cls}">${lbl}</span><span class="mq2">${q}</span>`;
    });
  }

  /* ===== editor ===== */
  let draft=null;
  function openEditor(asg){
    draft=asg?JSON.parse(JSON.stringify(asg)):{id:uid(),title:"",categoryId:(state.categories[0]&&state.categories[0].id)||"",videoUrl:"",checkpoints:[],createdAt:Date.now()};
    const isNew=!asg;
    const opts=state.categories.map(c=>`<option value="${c.id}" ${c.id===draft.categoryId?"selected":""}>${esc(c.name)}</option>`).join("");
    const m=document.createElement("div");m.className="modal show";m.id="editorModal";
    m.innerHTML=`<div class="sheet">
      <div class="shead"><div class="brand"><span class="mark">SW</span>${isNew?"Новое задание":"Редактирование"}</div><button class="ib" data-e="close">Закрыть ✕</button></div>
      <div class="body">
        <div class="field"><label>Название задания</label><input type="text" id="eTitle" value="${esc(draft.title)}" placeholder="Например: Present Perfect — интервью"></div>
        <div class="field"><label>Раздел</label><select id="eCat">${opts||'<option value="">Без раздела</option>'}</select></div>
        <div class="field"><label>Ссылка на видео</label>
          <div class="inline"><input type="url" id="eUrl" value="${esc(draft.videoUrl)}" placeholder="ссылка Яндекс Диска или прямая .mp4" style="flex:1;min-width:220px">
          <button class="btn cool sm" data-e="loadurl"><span class="sheen"></span>Загрузить</button>
          <span class="filepick btn ghost sm">Файл с компьютера<input type="file" id="eFile" accept="video/*"></span></div>
          <div class="help">Для России без VPN — публичная ссылка с Яндекс Диска (кнопка «Поделиться»). Также подойдёт прямая ссылка .mp4. Формат — MP4 (H.264); MKV/AVI браузеры не играют.</div></div>
        <div id="eslot"></div>
        <div class="cpbox"><h4>Остановки с вопросами</h4>
          <div class="field"><label>Вопрос / задание</label><input type="text" id="cQ" placeholder="Past Simple: Yesterday I ___ to school. (go)"></div>
          <div class="seg" id="cType"><button type="button" data-type="fill" class="on">Вписать ответ</button><button type="button" data-type="choice">Тест (варианты)</button></div>
          <div class="field" id="fillBox"><label>Правильный ответ (несколько — через ;)</label><input type="text" id="cA" placeholder="went; I went"></div>
          <div id="choiceBox" style="display:none">
            <label style="display:block;font-size:13px;font-weight:600;margin-bottom:8px">Варианты ответа (отметь точкой слева правильный)</label>
            <div id="optList"></div>
            <button type="button" class="btn ghost sm" data-e="addopt" style="margin-top:2px">＋ Вариант</button>
          </div>
          <div class="field" style="margin-top:15px"><label>Подсказка (необязательно)</label><input type="text" id="cH" placeholder="go — неправильный глагол"></div>
          <div class="inline">Текущий момент: <span class="nowtime" id="cNow">0:00</span><button class="btn sm" data-e="addcp"><span class="sheen"></span>＋ Добавить остановку здесь</button></div>
          <ul class="cplist" id="cpList"></ul>
        </div>
        <div class="inline" style="margin-top:24px;justify-content:flex-end">
          <button class="ib" data-e="close">Отмена</button>
          <button class="btn" data-e="save"><span class="sheen"></span>Сохранить задание</button>
        </div>
      </div></div>`;
    document.body.appendChild(m);
    mountPlayer($("#eslot"),draft,"edit");
    const nowI=setInterval(()=>{const n=$("#cNow");if(n)n.textContent=fmt(video.currentTime);else clearInterval(nowI);},300);
    renderCpList();
    let qType="fill";
    function addOptRow(val){const list=$("#optList");const row=document.createElement("div");row.className="optrow";row.innerHTML='<input type="radio" name="cpcorrect" title="правильный"><input type="text" placeholder="вариант ответа"><button type="button" class="del">✕</button>';if(val)row.querySelector('input[type=text]').value=val;row.querySelector(".del").addEventListener("click",()=>row.remove());list.appendChild(row);}
    function resetOpts(){const list=$("#optList");list.innerHTML="";addOptRow();addOptRow();addOptRow();}
    resetOpts();
    m.addEventListener("click",e=>{
      const tb=e.target.closest("[data-type]");
      if(tb){qType=tb.dataset.type;$("#cType").querySelectorAll("button").forEach(x=>x.classList.toggle("on",x===tb));$("#fillBox").style.display=qType==="fill"?"":"none";$("#choiceBox").style.display=qType==="choice"?"":"none";return;}
      const b=e.target.closest("[data-e]");if(!b)return;const act=b.dataset.e;
      if(act==="close")closeEditor(m);
      else if(act==="loadurl"){const u=$("#eUrl").value.trim();if(u){draft.videoUrl=u;loadSrc(u);}}
      else if(act==="addopt"){addOptRow();}
      else if(act==="addcp"){
        const q=$("#cQ").value.trim();
        if(!q){toast("Впиши вопрос");return;}
        let cp;
        if(qType==="choice"){
          const opts=[];let correct=null;
          $("#optList").querySelectorAll(".optrow").forEach(r=>{const t=r.querySelector('input[type=text]').value.trim();if(t){opts.push(t);if(r.querySelector('input[type=radio]').checked)correct=t;}});
          if(opts.length<2){toast("Нужно минимум 2 варианта");return;}
          if(correct==null){toast("Отметь точкой слева правильный вариант");return;}
          cp={id:uid(),time:Math.round(video.currentTime*10)/10,type:"choice",question:q,options:opts,answers:[correct],hint:$("#cH").value.trim()};
        }else{
          const a=$("#cA").value.split(";").map(x=>x.trim()).filter(Boolean);
          if(!a.length){toast("Впиши правильный ответ");return;}
          cp={id:uid(),time:Math.round(video.currentTime*10)/10,type:"fill",question:q,answers:a,hint:$("#cH").value.trim()};
        }
        draft.checkpoints.push(cp);
        $("#cQ").value="";$("#cA").value="";$("#cH").value="";resetOpts();
        renderCpList();renderMarkers();
      }
      else if(act==="save"){draft.title=$("#eTitle").value.trim()||"Без названия";draft.categoryId=$("#eCat").value;draft.videoUrl=$("#eUrl").value.trim();const i=state.assignments.findIndex(x=>x.id===draft.id);if(i>=0)state.assignments[i]=draft;else state.assignments.unshift(draft);saveData();closeEditor(m);render();toast("Задание сохранено");}
    });
    $("#eFile").addEventListener("change",e=>{const f=e.target.files[0];if(f){draft.videoUrl="";loadSrc(URL.createObjectURL(f));toast("Файл выбран (для проверки). Для учеников добавь ссылку.");}});
  }
  function renderCpList(){const ul=$("#cpList");if(!ul)return;const sorted=[...draft.checkpoints].sort((a,b)=>a.time-b.time);ul.innerHTML=sorted.length?"":'<li style="color:var(--dim);border:none;background:none">Пока нет остановок.</li>';sorted.forEach(c=>{const li=document.createElement("li");li.innerHTML=`<span class="t">${fmt(c.time)}</span><span class="qt">${c.type==="choice"?"◉ ":"✏ "}${esc(c.question)}</span><button class="del">✕</button>`;li.querySelector(".t").addEventListener("click",()=>{video.currentTime=c.time;});li.querySelector(".del").addEventListener("click",()=>{confirmAsk("Удалить остановку?","Этот вопрос будет удалён из урока.",()=>{draft.checkpoints=draft.checkpoints.filter(x=>x.id!==c.id);renderCpList();renderMarkers();});});ul.appendChild(li);});}
  function closeEditor(m){unmountPlayer();m.remove();}

  /* ===== clicks ===== */
  function onClick(e){const b=e.target.closest("[data-act]");if(!b)return;const[act,arg]=b.dataset.act.split(":");
    if(act==="logout"){authed=false;session=null;try{localStorage.removeItem("sw_rt");}catch(e){}location.hash="";route={view:"tutor"};render();}
    else if(act==="filter"){filterCat=arg;render();}
    else if(act==="addcat"){$("#catInput").classList.add("show");$("#catName").focus();}
    else if(act==="savecat"){const v=$("#catName").value.trim();if(v){state.categories.push({id:uid(),name:v});saveData();render();}}
    else if(act==="delcat"){e.stopPropagation();const n=state.assignments.filter(x=>x.categoryId===arg).length;if(n){toast("Сначала перенеси задания из этого раздела");return;}const c=state.categories.find(x=>x.id===arg);confirmAsk("Удалить раздел?",(c?("«"+c.name+"». "):"")+"Раздел будет удалён.",()=>{state.categories=state.categories.filter(x=>x.id!==arg);if(filterCat===arg)filterCat="all";saveData();render();});}
    else if(act==="new")openEditor(null);
    else if(act==="edit")openEditor(findAsg(arg));
    else if(act==="play"){route={view:"student",id:arg,preview:true};render();}
    else if(act==="invite")toast("Ссылка для ученика:",inviteLink(arg));
    else if(act==="live"){route={view:"monitor",id:arg};render();}
    else if(act==="cowatch"){const p=arg.split("~");route={view:"cowatch",aid:p[0],sid:p[1]};render();}
    else if(act==="clearmon"){confirmAsk("Очистить список?","Записи о текущих сессиях учеников будут удалены.",()=>{try{fetch(SROOT+"/"+arg+".json",{method:"DELETE"});}catch(e){}monData={};renderMon();},"Очистить");}
    else if(act==="del"){const a=findAsg(arg);confirmAsk("Удалить урок?",(a?("«"+a.title+"». "):"")+"Это действие нельзя отменить.",()=>{state.assignments=state.assignments.filter(x=>x.id!==arg);saveData();render();});}
    else if(act==="back"){route={view:"tutor"};render();}
  }
  document.addEventListener("click",onClick);
  document.addEventListener("keydown",e=>{if(e.target&&e.target.id==="catName"&&e.key==="Enter"){const v=e.target.value.trim();if(v){state.categories.push({id:uid(),name:v});saveData();render();}}});

  /* ===== router ===== */
  function render(){
    if(route.view!=="student")liveSession=null;
    if(route.view!=="student"&&route.view!=="cowatch")detachSync();
    if(route.view!=="monitor")closeMon();
    if(route.view==="student"){const a=findAsg(route.id);if(a){renderStudent(a,route.preview&&authed);return;}route={view:"tutor"};}
    if(!authed){renderLogin();return;}
    if(route.view==="monitor"){renderMonitor(route.id);return;}
    if(route.view==="cowatch"){renderCowatch(route.aid,route.sid);return;}
    renderTutor();
  }
  function applyHash(){const m=location.hash.match(/a=([a-z0-9]+)/i);if(m&&state&&findAsg(m[1])){route={view:"student",id:m[1],preview:false};}else{route={view:"tutor"};}}
  window.addEventListener("hashchange",()=>{applyHash();render();});

  /* ===== boot ===== */
  (async function(){const loaded=await loadData();state=loaded||seed();authed=await restore();applyHash();render();})();
})();
</script>
</body>
</html>
